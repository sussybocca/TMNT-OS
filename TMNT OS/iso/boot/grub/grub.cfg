insmod all_video
insmod gfxterm
insmod png
set gfxmode=640x480
set gfxpayload=keep
terminal_output gfxterm

if background_image /boot/grub/background.png; then
    set color_normal=white/black
    set color_highlight=black/green
else
    set color_normal=green/black
    set color_highlight=black/green
fi

set timeout=30
set default=0

menuentry "TMNT OS - GUI Desktop" {
    multiboot /boot/kernel.bin gui
    boot
}

menuentry "TMNT OS - Terminal Mode" {
    multiboot /boot/kernel.bin terminal
    boot
}

menuentry "TMNT OS - Safe Mode" {
    multiboot /boot/kernel.bin safe
    boot
}

menuentry "TMNT OS - Recovery" {
    multiboot /boot/kernel.bin recovery
    boot
}